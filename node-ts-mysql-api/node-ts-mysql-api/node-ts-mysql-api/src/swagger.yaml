openapi: 3.0.0
info:
  title: Node.js TypeScript MySQL API
  description: Authentication & Account Management API with JWT and Refresh Tokens
  version: 1.0.0

servers:
  - url: /

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Account:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        role: { type: string, enum: [Admin, User] }
        isVerified: { type: boolean }
        created: { type: string, format: date-time }
        updated: { type: string, format: date-time }

paths:
  /accounts/register:
    post:
      tags: [Accounts]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email, password, confirmPassword]
              properties:
                title: { type: string }
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string }
                password: { type: string }
                confirmPassword: { type: string }
      responses:
        '200':
          description: Registration successful

  /accounts/verify-email:
    post:
      tags: [Accounts]
      summary: Verify email address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200':
          description: Verification successful

  /accounts/authenticate:
    post:
      tags: [Accounts]
      summary: Authenticate and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Authentication successful

  /accounts/refresh-token:
    post:
      tags: [Accounts]
      summary: Refresh JWT using cookie refresh token
      responses:
        '200':
          description: New JWT returned

  /accounts/revoke-token:
    post:
      tags: [Accounts]
      summary: Revoke a refresh token
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
      responses:
        '200':
          description: Token revoked

  /accounts/forgot-password:
    post:
      tags: [Accounts]
      summary: Send password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string }
      responses:
        '200':
          description: Reset email sent

  /accounts/validate-reset-token:
    post:
      tags: [Accounts]
      summary: Validate a password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200':
          description: Token is valid

  /accounts/reset-password:
    post:
      tags: [Accounts]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, confirmPassword]
              properties:
                token: { type: string }
                password: { type: string }
                confirmPassword: { type: string }
      responses:
        '200':
          description: Password reset successful

  /accounts:
    get:
      tags: [Accounts]
      summary: Get all accounts (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
    post:
      tags: [Accounts]
      summary: Create account (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email, password, confirmPassword, role]
              properties:
                title: { type: string }
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string }
                password: { type: string }
                confirmPassword: { type: string }
                role: { type: string, enum: [Admin, User] }
      responses:
        '201':
          description: Account created

  /accounts/{id}:
    get:
      tags: [Accounts]
      summary: Get account by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
    put:
      tags: [Accounts]
      summary: Update account
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string }
                password: { type: string }
                confirmPassword: { type: string }
                role: { type: string, enum: [Admin, User] }
      responses:
        '200':
          description: Account updated
    delete:
      tags: [Accounts]
      summary: Delete account
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Account deleted
